<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}Monitor Cen{% endblock %}</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

  <nav class="navbar">
    <div class="container-xl w-100 px-3">
      <a class="navbar-brand fw-bold" href="/" style="font-size:1.25rem; letter-spacing:-0.02em">
        <i class="bi bi-graph-down-arrow me-1" style="color:#6366f1; font-size:1.35rem; vertical-align:-0.15em"></i>Monitor&nbsp;Cen
      </a>
      <div class="ms-auto d-flex align-items-center gap-2">
        <button id="dark-toggle" class="btn btn-sm btn-outline-secondary" onclick="toggleDark()" title="Tryb nocny">
          <i class="bi bi-moon-fill" id="dark-icon"></i>
        </button>
        <a href="/add" class="btn btn-warning btn-sm">
          <i class="bi bi-plus-lg me-2"></i>Dodaj produkt
        </a>
      </div>
    </div>
  </nav>

  {% block topbar %}{% endblock %}

  <div class="container-xl py-4 px-3">
    {% with messages = get_flashed_messages(with_categories=true) %}
      {% for category, message in messages %}
        <div class="alert alert-{{ category }} alert-dismissible fade show py-2" role="alert">
          {{ message }}
          <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
      {% endfor %}
    {% endwith %}

    {% block content %}{% endblock %}
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  {% block scripts %}{% endblock %}
<script>
function toggleDark() {
  const isDark = document.body.classList.toggle('dark-mode');
  localStorage.setItem('darkMode', isDark ? '1' : '0');
  document.getElementById('dark-icon').className = isDark ? 'bi bi-sun-fill' : 'bi bi-moon-fill';
}
(function() {
  if (localStorage.getItem('darkMode') === '1') {
    document.body.classList.add('dark-mode');
    const icon = document.getElementById('dark-icon');
    if (icon) icon.className = 'bi bi-sun-fill';
  }
})();
</script>
</body>
</html>
